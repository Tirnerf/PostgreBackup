<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PostgreSQL Yedekleme — Giriş</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: #f0f2f5;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }
    .login-wrap { width: 100%; max-width: 420px; padding: 1rem; }
    .card { border: none; border-radius: 14px; box-shadow: 0 6px 24px rgba(0,0,0,.12); }
    .login-header {
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 2rem 2rem 1.5rem;
      border-radius: 14px 14px 0 0;
      text-align: center;
    }
    .card-body { padding: 2rem; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="card">
    <div class="login-header">
      <i class="bi bi-database-fill-gear" style="font-size:2.4rem"></i>
      <h5 class="mt-2 mb-0 fw-semibold">PostgreSQL Yedekleme</h5>
    </div>
    <div class="card-body">
      {% if error %}
      <div class="alert alert-danger py-2 small mb-3">
        <i class="bi bi-exclamation-circle me-1"></i>{{ error }}
      </div>
      {% endif %}
      <form method="POST" action="/login">
        <div class="mb-3">
          <label class="form-label fw-semibold">Kullanıcı Adı</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="username" class="form-control" autofocus required>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Şifre</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="password" class="form-control" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          <i class="bi bi-box-arrow-in-right me-1"></i>Giriş Yap
        </button>
      </form>
    </div>
  </div>
  <p class="text-center text-muted small mt-3">
    Kullanıcı adı/şifre için <code>APP_USERNAME</code> ve <code>APP_PASSWORD</code> env değişkenlerini ayarlayın.
  </p>
</div>
</body>
</html>
